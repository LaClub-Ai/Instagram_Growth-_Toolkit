services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: instagram-growth-toolkit-backend
    container_name: insta-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DB_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - COOLIFY_API_KEY=${COOLIFY_API_KEY}
      - COOLIFY_INSTANCE_URL=${COOLIFY_INSTANCE_URL}
      - INSTAGRAM_USER=${INSTAGRAM_USER}
      - INSTAGRAM_PASS=${INSTAGRAM_PASS}
      - SSL_EMAIL=${SSL_EMAIL}
    volumes:
      - backend-data:/app/data
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      insta-network:
        ipv4_address: 172.25.0.10

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: instagram-growth-toolkit-worker
    container_name: insta-worker
    restart: unless-stopped
    command: celery -A app.core.worker.celery worker --loglevel=info -P gevent -c 4
    environment:
      - APP_ENV=production
      - DB_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - COOLIFY_API_KEY=${COOLIFY_API_KEY}
      - COOLIFY_INSTANCE_URL=${COOLIFY_INSTANCE_URL}
      - INSTAGRAM_USER=${INSTAGRAM_USER}
      - INSTAGRAM_PASS=${INSTAGRAM_PASS}
      - SSL_EMAIL=${SSL_EMAIL}
    volumes:
      - backend-data:/app/data
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      insta-network:
        ipv4_address: 172.25.0.11

  db:
    image: postgres:15-alpine
    container_name: insta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      insta-network:
        ipv4_address: 172.25.0.12

  redis:
    image: redis:7-alpine
    container_name: insta-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      insta-network:
        ipv4_address: 172.25.0.13

  proxy:
    image: nginx:alpine
    container_name: insta-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      insta-network:
        ipv4_address: 172.25.0.14

volumes:
  backend-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  insta-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16